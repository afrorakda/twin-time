<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="image_40.png">
    <link rel="icon" href="image_40.png">
    <title>Twin Time - Fridge Combo</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --container-bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --ghost: #888;
            --radius: 15px;
            --night-bg: #1a1a1a;
            --night-text: #eee;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: var(--container-bg);
            padding: 30px 15px;
            border-radius: var(--radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Them Area (Main) - 巨大化 */
        .them-section {
            width: 100%;
            background-color: var(--input-bg);
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: 0.3s ease;
        }
        .them-section.night {
            background-color: var(--night-bg);
            border-color: var(--night-bg);
            color: var(--night-text);
        }

        .label { font-size: 13px; font-weight: 800; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; }
        .night .label { opacity: 0.7; }

        /* 時間を巨大化 */
        .time-display-huge { 
            font-size: 100px; /* 超巨大化 */
            font-weight: 900; 
            line-height: 1; 
            letter-spacing: -6px; 
            margin: 10px 0 5px; 
        }
        .date-display-them { 
            font-size: 16px; 
            font-weight: 700; 
            color: var(--main);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .night .date-display-them { color: var(--night-text); }

        .diff-tag { 
            font-size: 11px; font-weight: 800; padding: 3px 8px; 
            border-radius: 10px; background: rgba(0,0,0,0.06); 
        }
        .night .diff-tag { background: rgba(255,255,255,0.15); }

        .night-icon { font-size: 28px; position: absolute; top: 15px; right: 15px; display: none; }
        .night .night-icon { display: block; }

        /* You Area (Sub) */
        .you-section {
            width: 100%;
            padding: 10px;
            text-align: center;
            opacity: 0.6;
        }
        .time-display-small { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -1.5px; margin: 0 0 5px; }
        .date-display-small { font-size: 14px; font-weight: 600; }

        /* City Selector */
        select {
            width: 100%;
            padding: 18px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background-color: var(--input-bg);
            font-size: 16px;
            font-weight: 700;
            color: var(--main);
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            transition: 0.2s;
        }

        /* Action Buttons (buy & add) */
        .support-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            border-top: 1px solid var(--accent);
            padding-top: 25px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background-color: var(--main);
            color: var(--container-bg);
            border: none;
            border-radius: var(--radius);
            padding: 18px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.1s;
        }
        .action-btn:active { transform: scale(0.98); }

        .gh-icon { font-size: 16px; opacity: 0.8; }

        footer {
            margin-top: auto;
            padding: 40px 0 20px;
            text-align: center;
            font-size: 11px;
            line-height: 1.8;
            opacity: 0.5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--container-bg);
            padding: 30px;
            border-radius: var(--radius);
            max-width: 340px;
            width: 90%;
            position: relative;
        }

        .modal-close-x {
            position: absolute;
            top: 15px; right: 15px;
            color: #ccc; font-size: 22px; cursor: pointer;
            padding: 5px;
        }

        .modal-title {
            display: flex; align-items: center; gap: 10px;
            font-size: 20px; font-weight: bold; margin-bottom: 25px;
        }

        .modal-item { margin-bottom: 18px; font-size: 14px; line-height: 1.6; color: #555; }
        .modal-item b { display: block; margin-bottom: 3px; color: var(--main); }

    </style>
</head>
<body>

<div class="container">
    <div id="them-area" class="them-section">
        <div class="night-icon">🌙</div>
        <div class="label">Them</div>
        <div id="them-time" class="time-display-huge">00:00</div>
        <div class="date-display-them">
            <span id="them-date">---</span>
            <span id="them-diff" class="diff-tag"></span>
        </div>
    </div>

    <div class="you-section">
        <div class="label">You</div>
        <div id="you-time" class="time-display-small">00:00</div>
        <div id="you-date" class="date-display-small">---</div>
    </div>

    <select id="city-selector" onchange="saveAndRefresh()">
        <optgroup label="Major Cities">
            <option value="0">London (UTC+0)</option>
            <option value="1">Berlin / Paris (UTC+1)</option>
            <option value="4">Dubai (UTC+4)</option>
            <option value="5.5">Mumbai (UTC+5:30)</option>
            <option value="7">Bangkok (UTC+7)</option>
            <option value="8" selected>Singapore / KL (UTC+8)</option>
            <option value="9">Tokyo / Seoul (UTC+9)</option>
            <option value="10">Sydney (UTC+10)</option>
            <option value="-5">New York (UTC-5)</option>
            <option value="-8">Los Angeles (UTC-8)</option>
        </optgroup>
        <optgroup label="Manual UTC Offset">
            <option value="-12">UTC-12</option>
            <option value="-11">UTC-11</option>
            <option value="-10">UTC-10</option>
            <option value="-9">UTC-9</option>
            <option value="-8">UTC-8</option>
            <option value="-7">UTC-7</option>
            <option value="-6">UTC-6</option>
            <option value="-5">UTC-5</option>
            <option value="-4">UTC-4</option>
            <option value="-3">UTC-3</option>
            <option value="-2">UTC-2</option>
            <option value="-1">UTC-1</option>
            <option value="0">UTC+0</option>
            <option value="1">UTC+1</option>
            <option value="2">UTC+2</option>
            <option value="3">UTC+3</option>
            <option value="4">UTC+4</option>
            <option value="5">UTC+5</option>
            <option value="6">UTC+6</option>
            <option value="7">UTC+7</option>
            <option value="8">UTC+8</option>
            <option value="9">UTC+9</option>
            <option value="10">UTC+10</option>
            <option value="11">UTC+11</option>
            <option value="12">UTC+12</option>
            <option value="13">UTC+13</option>
            <option value="14">UTC+14</option>
        </optgroup>
    </select>

    <div class="support-area">
        <a href="https://ko-fi.com/afrorakda" class="action-btn">☕️ buy me a coffee</a>
        <button class="action-btn" onclick="showModal()">📱 Add to Home Screen</button>
    </div>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    Privacy Policy / afrorakda © 2026
</footer>

<div id="homeModal" class="modal">
    <div class="modal-content">
        <div class="modal-close-x" onclick="closeModal()">×</div>
        <div class="modal-title"><span>📱</span> Install</div>
        <div class="modal-item">
            Add this tool to your home screen.
        </div>
        <div class="modal-item">
            <b>🍏 iPhone (Safari):</b>
            Tap Share, then Add to Home Screen.
        </div>
        <div class="modal-item">
            <b>🤖 Android (Chrome):</b>
            Tap Menu (⋮), then Add to Home Screen.
        </div>
    </div>
</div>

<script>
    const themTimeEl = document.getElementById('them-time');
    const themDateEl = document.getElementById('them-date');
    const themDiffEl = document.getElementById('them-diff');
    const themArea = document.getElementById('them-area');
    const youTimeEl = document.getElementById('you-time');
    const youDateEl = document.getElementById('you-date');
    const citySelector = document.getElementById('city-selector');

    // Load saved city
    const savedOffset = localStorage.getItem('twinTimeOffset');
    if (savedOffset !== null) {
        citySelector.value = savedOffset;
    }

    function saveAndRefresh() {
        localStorage.setItem('twinTimeOffset', citySelector.value);
        updateClocks();
    }

    function updateClocks() {
        const now = new Date();
        
        // YOU (Local)
        youTimeEl.innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        youDateEl.innerText = now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });

        // THEM (Selected)
        const targetOffset = parseFloat(citySelector.value);
        
        // Calculate target time
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const themDate = new Date(utc + (3600000 * targetOffset));

        const themH = themDate.getHours();
        themTimeEl.innerText = themDate.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        // 曜日を追加 (weekday: 'short')
        themDateEl.innerText = themDate.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });

        // Relative Date (Yesterday / Tomorrow)
        const youDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const themDay = new Date(themDate.getFullYear(), themDate.getMonth(), themDate.getDate());
        const diffDays = (themDay - youDay) / (1000 * 60 * 60 * 24);

        if (diffDays > 0.5) {
            themDiffEl.innerText = "Tomorrow";
            themDiffEl.style.display = "inline-block";
        } else if (diffDays < -0.5) {
            themDiffEl.innerText = "Yesterday";
            themDiffEl.style.display = "inline-block";
        } else {
            themDiffEl.style.display = "none";
        }

        // Night Mode (20:00 - 05:00)
        if (themH >= 20 || themH < 5) {
            themArea.classList.add('night');
        } else {
            themArea.classList.remove('night');
        }
    }

    function showModal() { document.getElementById('homeModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('homeModal').style.display = 'none'; }

    setInterval(updateClocks, 1000);
    updateClocks();

</script>

</body>
</html>
